#yamlPreprocessor=on
project:
  name: datbp25-sprint-app
  description: Sprintova aplikace pro DA Test Brno podzim 2025
  tags:
    - dat25

services:
  - hostname: lecturers
    type: php-apache@8.1
    enableSubdomainAccess: false
    envSecrets:
      APP_KEY: <@generateRandomString(<32>)>

  - hostname: commitky
    type: php-apache@8.1
    enableSubdomainAccess: false
    envSecrets:
      APP_KEY: <@generateRandomString(<32>)>

  - hostname: threeversusone
    type: php-apache@8.1
    enableSubdomainAccess: false
    envSecrets:
      APP_KEY: <@generateRandomString(<32>)>

  - hostname: veverkyexotky
    type: php-apache@8.1
    enableSubdomainAccess: false
    envSecrets:
      APP_KEY: <@generateRandomString(<32>)>

  - hostname: ikeitas
    type: php-apache@8.1
    enableSubdomainAccess: false
    envSecrets:
      APP_KEY: <@generateRandomString(<32>)>

  - hostname: db
    type: mariadb@10.6
    mode: NON_HA

  - hostname: adminer
    type: php-apache@8.3
    buildFromGit: https://github.com/zeropsio/recipe-adminer@main
    enableSubdomainAccess: false
